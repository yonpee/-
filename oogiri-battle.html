<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大喜利バトル</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Dots&family=Noto+Sans+JP:wght@400;700;900&display=swap');
:root {
  --bg: #fdf6e3;
  --paper: #fffdf5;
  --ink: #1a0a00;
  --red: #c0392b;
  --gold: #d4a017;
  --darkgold: #8a6400;
  --muted: #8a7a6a;
  --border: #d4c4a0;
  --stamp: #b03020;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  background-image: radial-gradient(ellipse at 20% 50%, rgba(212,160,23,0.07) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(192,57,43,0.05) 0%, transparent 50%);
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: repeating-linear-gradient(transparent, transparent 31px, rgba(180,160,120,0.15) 31px, rgba(180,160,120,0.15) 32px);
  pointer-events: none; z-index: 0;
}
#app { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 16px 16px 60px; }
header { text-align: center; padding: 28px 0 20px; border-bottom: 3px double var(--border); margin-bottom: 24px; }
.logo { font-family: 'Zen Dots', cursive; font-size: clamp(36px, 8vw, 72px); color: var(--ink); letter-spacing: 4px; position: relative; display: inline-block; }
.logo::after { content: 'BATTLE'; display: block; font-size: 0.28em; letter-spacing: 12px; color: var(--red); margin-top: -4px; }
.stamp { display: inline-block; border: 3px solid var(--stamp); color: var(--stamp); font-family: 'Zen Dots', cursive; font-size: 11px; letter-spacing: 3px; padding: 3px 10px; border-radius: 3px; transform: rotate(-4deg); margin-left: 12px; vertical-align: middle; opacity: 0.8; }
.screen { display: none; }
.screen.active { display: block; }
.card { background: var(--paper); border: 1px solid var(--border); border-radius: 4px; padding: 24px; margin-bottom: 16px; box-shadow: 2px 3px 12px rgba(0,0,0,0.08), inset 0 0 0 1px rgba(255,255,255,0.6); position: relative; }
.card::before { content: ''; position: absolute; top: 0; left: 24px; right: 24px; height: 3px; background: linear-gradient(90deg, transparent, var(--gold), transparent); opacity: 0.5; }
h2 { font-family: 'Zen Dots', cursive; font-size: 20px; letter-spacing: 2px; color: var(--darkgold); margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 13px 28px; border-radius: 4px; border: none; font-family: 'Zen Dots', cursive; font-size: 16px; letter-spacing: 2px; cursor: pointer; transition: transform 0.1s, box-shadow 0.1s; }
.btn:hover { transform: translateY(-2px); }
.btn:active { transform: translateY(1px); }
.btn-primary { background: var(--ink); color: var(--bg); box-shadow: 3px 3px 0 var(--darkgold); }
.btn-primary:hover { box-shadow: 5px 5px 0 var(--darkgold); }
.btn-red { background: var(--red); color: #fff; box-shadow: 3px 3px 0 #7a1a10; }
.btn-red:hover { box-shadow: 5px 5px 0 #7a1a10; }
.btn-gold { background: var(--gold); color: var(--ink); box-shadow: 3px 3px 0 var(--darkgold); }
.btn-gold:hover { box-shadow: 5px 5px 0 var(--darkgold); }
.btn-outline { background: transparent; color: var(--ink); border: 2px solid var(--border); box-shadow: 2px 2px 0 var(--border); }
.btn-full { width: 100%; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
.player-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.player-row { display: flex; align-items: center; gap: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 10px 14px; }
.player-num { font-family: 'Zen Dots', cursive; font-size: 18px; color: var(--muted); width: 28px; text-align: center; }
.player-input { flex: 1; background: transparent; border: none; border-bottom: 1px dashed var(--border); color: var(--ink); font-family: 'Noto Sans JP', sans-serif; font-size: 15px; outline: none; padding: 4px 0; }
.player-input::placeholder { color: var(--muted); }
.btn-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 4px 8px; border-radius: 4px; }
.btn-remove:hover { color: var(--red); }
.round-setting { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; }
.setting-label { font-size: 14px; color: var(--muted); }
.counter-wrap { display: flex; align-items: center; gap: 14px; }
.counter-btn { width: 32px; height: 32px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg); color: var(--ink); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.counter-btn:hover { border-color: var(--gold); }
.counter-val { font-family: 'Zen Dots', cursive; font-size: 26px; color: var(--red); min-width: 32px; text-align: center; }
.topic-card { background: var(--ink); color: var(--bg); border-radius: 8px; padding: 28px 24px; margin-bottom: 20px; text-align: center; position: relative; overflow: hidden; }
.topic-card::before { content: '大喜利お題'; position: absolute; top: 12px; left: 16px; font-size: 10px; letter-spacing: 3px; color: var(--gold); font-family: 'Zen Dots', cursive; }
.topic-text { font-size: clamp(18px, 4vw, 26px); font-weight: 900; line-height: 1.6; margin-top: 8px; }
.round-badge { position: absolute; top: 12px; right: 16px; font-family: 'Zen Dots', cursive; font-size: 11px; color: var(--gold); letter-spacing: 2px; }
.answer-section { margin-bottom: 12px; }
.answer-player-name { font-weight: 900; font-size: 18px; margin-bottom: 8px; color: var(--red); }
.answer-input { width: 100%; background: var(--bg); border: 2px solid var(--border); border-radius: 4px; padding: 14px 16px; font-family: 'Noto Sans JP', sans-serif; font-size: 16px; color: var(--ink); outline: none; resize: none; transition: border-color 0.2s; min-height: 80px; }
.answer-input:focus { border-color: var(--gold); }
.answers-list { display: flex; flex-direction: column; gap: 10px; margin: 16px 0; }
.answer-item { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 14px 16px; cursor: pointer; transition: border-color 0.2s, transform 0.1s, background 0.2s; display: flex; align-items: flex-start; gap: 12px; }
.answer-item:hover { border-color: var(--gold); transform: translateX(4px); }
.answer-item.selected { border-color: var(--red); background: rgba(192,57,43,0.05); }
.answer-index { font-family: 'Zen Dots', cursive; font-size: 20px; color: var(--muted); width: 28px; flex-shrink: 0; text-align: center; }
.answer-text { font-size: 16px; font-weight: 700; flex: 1; line-height: 1.5; }
.vote-mark { font-size: 18px; opacity: 0; transition: opacity 0.2s; }
.answer-item.selected .vote-mark { opacity: 1; }
.scoring-overlay { text-align: center; padding: 32px 24px; }
.scoring-title { font-family: 'Zen Dots', cursive; font-size: 22px; color: var(--darkgold); margin-bottom: 8px; letter-spacing: 3px; }
.scoring-sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
.spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.result-podium { display: flex; flex-direction: column; gap: 10px; margin: 16px 0; }
.result-item { display: flex; align-items: center; gap: 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 14px 16px; position: relative; overflow: hidden; }
.result-item.rank-1 { background: linear-gradient(135deg, #fffbe6, #fdf3c0); border-color: var(--gold); border-width: 2px; }
.result-rank { font-family: 'Zen Dots', cursive; font-size: 28px; width: 40px; text-align: center; flex-shrink: 0; }
.result-rank.r1 { color: var(--gold); }
.result-rank.r2 { color: #888; }
.result-rank.r3 { color: #a06020; }
.result-rank.other { color: var(--muted); font-size: 20px; }
.result-info { flex: 1; }
.result-name { font-weight: 900; font-size: 16px; }
.result-answer { font-size: 13px; color: var(--muted); margin-top: 3px; line-height: 1.5; }
.result-score-wrap { text-align: right; }
.result-score { font-family: 'Zen Dots', cursive; font-size: 28px; color: var(--red); }
.result-score-label { font-size: 10px; color: var(--muted); letter-spacing: 2px; }
.ai-comment { font-size: 12px; color: var(--darkgold); margin-top: 4px; font-style: italic; line-height: 1.5; }
.scoreboard { display: flex; flex-direction: column; gap: 8px; margin: 12px 0; }
.score-row { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; }
.score-name { flex: 1; font-weight: 700; }
.score-bar-wrap { flex: 2; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.score-bar { height: 100%; background: var(--red); border-radius: 4px; transition: width 0.8s ease; }
.score-pts { font-family: 'Zen Dots', cursive; font-size: 18px; color: var(--darkgold); min-width: 40px; text-align: right; }
.history-item { padding: 10px 0; border-bottom: 1px dashed var(--border); }
.history-item:last-child { border-bottom: none; }
.history-topic { font-size: 12px; color: var(--muted); letter-spacing: 1px; margin-bottom: 4px; }
.history-winner { font-weight: 700; font-size: 14px; }
.progress-row { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.progress-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); transition: background 0.3s; }
.progress-dot.done { background: var(--darkgold); }
.progress-dot.active { background: var(--red); }
.progress-label { font-size: 12px; color: var(--muted); letter-spacing: 2px; margin-left: auto; }
.mt16 { margin-top: 16px; }
.mt8 { margin-top: 8px; }
.text-center { text-align: center; }
.text-muted { color: var(--muted); font-size: 13px; }
.flex-gap { display: flex; gap: 10px; flex-wrap: wrap; }
.hidden { display: none !important; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div><span class="logo">大喜利</span><span class="stamp">AI JUDGE</span></div>
  </header>
  <div id="screen-setup" class="screen active">
    <div class="card">
      <h2>PLAYERS</h2>
      <div class="player-list" id="player-list"></div>
      <button class="btn btn-outline" id="btn-add-player" style="font-size:13px;padding:9px 18px;">＋ プレイヤーを追加</button>
    </div>
    <div class="card">
      <h2>SETTINGS</h2>
      <div class="round-setting">
        <span class="setting-label">ラウンド数</span>
        <div class="counter-wrap">
          <button class="counter-btn" id="round-minus">－</button>
          <div class="counter-val" id="round-count">3</div>
          <button class="counter-btn" id="round-plus">＋</button>
        </div>
      </div>
    </div>
    <button class="btn btn-primary btn-full" id="btn-start" style="font-size:18px;padding:16px;">開幕！</button>
  </div>
  <div id="screen-input" class="screen">
    <div class="progress-row" id="input-progress"></div>
    <div class="topic-card">
      <div class="round-badge" id="round-badge">ROUND 1</div>
      <div class="topic-text" id="topic-text"></div>
    </div>
    <div class="card">
      <h2>回答入力</h2>
      <div id="answer-inputs"></div>
      <div class="mt16">
        <button class="btn btn-primary btn-full" id="btn-submit-answers" style="font-size:17px;padding:15px;">全員入力完了！</button>
      </div>
    </div>
  </div>
  <div id="screen-vote" class="screen">
    <div class="topic-card">
      <div class="round-badge" id="vote-round-badge">ROUND 1</div>
      <div class="topic-text" id="vote-topic-text"></div>
    </div>
    <div class="card">
      <h2>🗳 みんなで投票！</h2>
      <p class="text-muted" style="margin-bottom:14px;">一番面白いと思う回答を選ぼう（自分以外）</p>
      <div id="vote-answers-list" class="answers-list"></div>
      <div id="vote-status" class="text-muted text-center mt8"></div>
      <div class="mt16">
        <button class="btn btn-red btn-full hidden" id="btn-to-scoring" style="font-size:17px;padding:15px;">AI採点へ！</button>
      </div>
    </div>
  </div>
  <div id="screen-scoring" class="screen">
    <div class="card">
      <div class="scoring-overlay">
        <div class="scoring-title">AI採点中…</div>
        <div class="scoring-sub">AIが全員の回答を評価しています</div>
        <div class="spinner"></div>
        <p class="text-muted">しばらくお待ちください</p>
      </div>
    </div>
  </div>
  <div id="screen-round-result" class="screen">
    <div class="card">
      <h2 id="round-result-title">ROUND 1 結果</h2>
      <div class="topic-card" style="padding:16px 20px;margin-bottom:16px;">
        <div style="font-size:11px;color:var(--gold);letter-spacing:3px;margin-bottom:4px;">お題</div>
        <div class="topic-text" id="result-topic" style="font-size:16px;margin-top:0;"></div>
      </div>
      <div class="result-podium" id="result-podium"></div>
    </div>
    <div class="card">
      <h2>現在のスコア</h2>
      <div class="scoreboard" id="scoreboard"></div>
    </div>
    <button class="btn btn-primary btn-full" id="btn-next-round" style="font-size:18px;padding:16px;"></button>
  </div>
  <div id="screen-final" class="screen">
    <div class="card" style="text-align:center;padding:36px 24px;">
      <div style="font-family:'Zen Dots',cursive;font-size:13px;letter-spacing:4px;color:var(--gold);margin-bottom:8px;">GRAND CHAMPION</div>
      <div style="font-size:48px;margin-bottom:4px;">🏆</div>
      <div style="font-family:'Zen Dots',cursive;font-size:32px;color:var(--red);letter-spacing:3px;" id="champion-name"></div>
      <div style="color:var(--muted);font-size:14px;margin-top:8px;" id="champion-score"></div>
    </div>
    <div class="card">
      <h2>最終スコア</h2>
      <div class="scoreboard" id="final-scoreboard"></div>
    </div>
    <div class="card">
      <h2>ラウンド履歴</h2>
      <div id="round-history"></div>
    </div>
    <div class="flex-gap mt16">
      <button class="btn btn-primary" style="flex:1;font-size:16px;" id="btn-play-again">もう一回！</button>
      <button class="btn btn-outline" style="flex:1;font-size:16px;" id="btn-setup-again">設定に戻る</button>
    </div>
  </div>
</div>
<script>
const TOPICS = [
  "こんな「おじいちゃんの知恵袋」は嫌だ","AIが人間に反乱を起こした理由が意外すぎた","こんな「地獄のラーメン屋」は嫌だ","宇宙人が地球に来て一番驚いたこと","こんな「優しい幽霊」は嫌だ","ロボットが人間に嫉妬している理由","タイムマシンで過去に行ったら絶対やらないこと","こんな「ゆるキャラ」は嫌だ","神様が「さすがにそれは創らなきゃよかった」と思っているもの","こんな「世界一親切な銀行強盗」は嫌だ","モナ・リザが実はニヤニヤしている理由","こんな「未来のコンビニ」は嫌だ","こんな「最強の言い訳」は嫌だ","外来語で言うとかっこいいが、実態はダサいもの","こんな「サンタクロース」は嫌だ","人類が月に行って最初に思ったこと（本音）","こんな「やさしいモンスター」は嫌だ","スマホが実は密かにやっていること","こんな「奇跡の一致」は嫌だ","お化けが現代社会で一番困っていること",
];
let state = { players:[], totalRounds:3, currentRound:0, topics:[], answers:{}, votes:{}, scores:{}, roundHistory:[], shuffledAnswers:[] };
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function makeDots(containerId,total,current){const c=document.getElementById(containerId);c.innerHTML='';for(let i=0;i<total;i++){const d=document.createElement('div');d.className='progress-dot'+(i<current?' done':i===current?' active':'');c.appendChild(d);}const lbl=document.createElement('div');lbl.className='progress-label';lbl.textContent=`ROUND ${current+1} / ${total}`;c.appendChild(lbl);}
function renderPlayers(){const list=document.getElementById('player-list');list.innerHTML='';state.players.forEach((p,i)=>{const row=document.createElement('div');row.className='player-row';row.innerHTML=`<div class="player-num">${i+1}</div><input class="player-input" placeholder="プレイヤー${i+1}の名前" value="${p}"><button class="btn-remove" data-i="${i}">✕</button>`;row.querySelector('input').addEventListener('input',e=>state.players[i]=e.target.value.trim());row.querySelector('.btn-remove').addEventListener('click',()=>{state.players.splice(i,1);renderPlayers();});list.appendChild(row);});}
for(let i=0;i<4;i++)state.players.push('');
renderPlayers();
document.getElementById('btn-add-player').addEventListener('click',()=>{if(state.players.length>=8)return;state.players.push('');renderPlayers();});
let roundCount=3;
document.getElementById('round-minus').addEventListener('click',()=>{if(roundCount>1){roundCount--;document.getElementById('round-count').textContent=roundCount;}});
document.getElementById('round-plus').addEventListener('click',()=>{if(roundCount<6){roundCount++;document.getElementById('round-count').textContent=roundCount;}});
document.getElementById('btn-start').addEventListener('click',()=>{const named=state.players.filter(p=>p.length>0);if(named.length<2){alert('プレイヤーは2人以上必要です！');return;}state.players=named;state.totalRounds=roundCount;state.scores={};state.players.forEach(p=>state.scores[p]=0);state.topics=shuffle([...TOPICS]).slice(0,state.totalRounds);state.currentRound=0;state.roundHistory=[];startRound();});
function startRound(){const topic=state.topics[state.currentRound];state.answers={};state.votes={};makeDots('input-progress',state.totalRounds,state.currentRound);document.getElementById('round-badge').textContent=`ROUND ${state.currentRound+1}`;document.getElementById('topic-text').textContent=topic;const container=document.getElementById('answer-inputs');container.innerHTML='';state.players.forEach(p=>{const div=document.createElement('div');div.className='answer-section';div.innerHTML=`<div class="answer-player-name">${p}</div><textarea class="answer-input" data-player="${p}" placeholder="面白い回答を考えよう！"></textarea>`;container.appendChild(div);});show('screen-input');}
document.getElementById('btn-submit-answers').addEventListener('click',()=>{let allFilled=true;document.querySelectorAll('.answer-input').forEach(input=>{const val=input.value.trim();if(!val){allFilled=false;input.style.borderColor='var(--red)';}else{state.answers[input.dataset.player]=val;input.style.borderColor='';}});if(!allFilled){alert('全員の回答を入力してください！');return;}startVote();});
function startVote(){const topic=state.topics[state.currentRound];document.getElementById('vote-round-badge').textContent=`ROUND ${state.currentRound+1}`;document.getElementById('vote-topic-text').textContent=topic;state.shuffledAnswers=shuffle(state.players.map(p=>({player:p,answer:state.answers[p]})));state.votes={};let voterIndex=0;function renderVote(){const list=document.getElementById('vote-answers-list');list.innerHTML='';state.shuffledAnswers.forEach((item,idx)=>{const div=document.createElement('div');div.className='answer-item';div.innerHTML=`<div class="answer-index">${idx+1}</div><div class="answer-text">${item.answer}</div><div class="vote-mark">✓</div>`;div.addEventListener('click',()=>{if(voterIndex>=state.players.length)return;const voter=state.players[voterIndex];if(voter===item.player){alert('自分の回答には投票できません！');return;}state.votes[voter]=item.player;voterIndex++;const status=document.getElementById('vote-status');if(voterIndex<state.players.length){status.textContent=`次は ${state.players[voterIndex]} が投票 (${voterIndex}/${state.players.length})`;}else{status.textContent='全員投票完了！';document.getElementById('btn-to-scoring').classList.remove('hidden');}renderVote();});list.appendChild(div);});document.getElementById('vote-status').textContent=voterIndex<state.players.length?`まず ${state.players[voterIndex]} が投票 (0/${state.players.length})`:'全員投票完了！';}document.getElementById('btn-to-scoring').classList.add('hidden');renderVote();show('screen-vote');}
document.getElementById('btn-to-scoring').addEventListener('click',()=>{show('screen-scoring');scoreWithAI();});
async function scoreWithAI(){const topic=state.topics[state.currentRound];const answersText=state.players.map((p,i)=>`回答${i+1}（${p}）：${state.answers[p]}`).join('\n');let aiScores={};let aiComments={};try{const response=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:`あなたは大喜利の審査員です。以下のお題に対する回答を採点してください。\n\nお題：「${topic}」\n\n回答一覧：\n${answersText}\n\n各回答を0〜100点で採点し、一言コメントをつけてください。\n必ず以下のJSON形式だけで返答してください（他のテキストは一切不要）：\n{\n  "scores": {\n    ${state.players.map(p=>`"${p}": 数字`).join(',\n    ')}\n  },\n  "comments": {\n    ${state.players.map(p=>`"${p}": "コメント"`).join(',\n    ')}\n  }\n}`}]})});const data=await response.json();const text=data.content.map(c=>c.text||'').join('');const clean=text.replace(/```json|```/g,'').trim();const parsed=JSON.parse(clean);aiScores=parsed.scores;aiComments=parsed.comments;}catch(e){state.players.forEach(p=>{aiScores[p]=Math.floor(Math.random()*60)+30;aiComments[p]='面白い！';});}
const voteBonus={};state.players.forEach(p=>voteBonus[p]=0);Object.values(state.votes).forEach(target=>{voteBonus[target]=(voteBonus[target]||0)+10;});
const roundScores={};state.players.forEach(p=>{roundScores[p]=(aiScores[p]||0)+(voteBonus[p]||0);state.scores[p]+=roundScores[p];});
const sorted=[...state.players].sort((a,b)=>roundScores[b]-roundScores[a]);state.roundHistory.push({topic:state.topics[state.currentRound],winner:sorted[0],winnerAnswer:state.answers[sorted[0]],answers:state.answers,roundScores,aiComments,voteBonus});
showRoundResult(sorted,roundScores,aiComments,voteBonus);}
function showRoundResult(sorted,roundScores,aiComments,voteBonus){document.getElementById('round-result-title').textContent=`ROUND ${state.currentRound+1} 結果`;document.getElementById('result-topic').textContent=state.topics[state.currentRound];const podium=document.getElementById('result-podium');podium.innerHTML='';sorted.forEach((p,i)=>{const div=document.createElement('div');div.className='result-item'+(i===0?' rank-1':'');const rankClass=['r1','r2','r3'][i]||'other';const rankLabel=['🥇','🥈','🥉'][i]||`${i+1}`;div.innerHTML=`<div class="result-rank ${rankClass}">${rankLabel}</div><div class="result-info"><div class="result-name">${p}</div><div class="result-answer">「${state.answers[p]}」</div><div class="ai-comment">AI: ${aiComments[p]||'─'} ${voteBonus[p]?`（投票ボーナス+${voteBonus[p]}）`:''}</div></div><div class="result-score-wrap"><div class="result-score">${roundScores[p]}</div><div class="result-score-label">POINTS</div></div>`;podium.appendChild(div);});renderScoreboard('scoreboard');const nextBtn=document.getElementById('btn-next-round');state.currentRound++;if(state.currentRound<state.totalRounds){nextBtn.textContent=`ROUND ${state.currentRound+1} へ！`;nextBtn.onclick=startRound;}else{nextBtn.textContent='最終結果を見る！';nextBtn.className='btn btn-gold btn-full';nextBtn.style.fontSize='18px';nextBtn.style.padding='16px';nextBtn.onclick=showFinal;}show('screen-round-result');}
function renderScoreboard(id){const el=document.getElementById(id);el.innerHTML='';const maxScore=Math.max(...Object.values(state.scores),1);const sorted=[...state.players].sort((a,b)=>state.scores[b]-state.scores[a]);sorted.forEach(p=>{const pct=(state.scores[p]/maxScore*100).toFixed(1);const div=document.createElement('div');div.className='score-row';div.innerHTML=`<div class="score-name">${p}</div><div class="score-bar-wrap"><div class="score-bar" style="width:${pct}%"></div></div><div class="score-pts">${state.scores[p]}</div>`;el.appendChild(div);});}
function showFinal(){const sorted=[...state.players].sort((a,b)=>state.scores[b]-state.scores[a]);const champion=sorted[0];document.getElementById('champion-name').textContent=champion;document.getElementById('champion-score').textContent=`合計 ${state.scores[champion]} ポイント`;renderScoreboard('final-scoreboard');const history=document.getElementById('round-history');history.innerHTML='';state.roundHistory.forEach((r,i)=>{const div=document.createElement('div');div.className='history-item';div.innerHTML=`<div class="history-topic">ROUND ${i+1}｜${r.topic}</div><div class="history-winner">🏅 ${r.winner}「${r.winnerAnswer}」</div>`;history.appendChild(div);});show('screen-final');}
document.getElementById('btn-play-again').addEventListener('click',()=>{state.scores={};state.players.forEach(p=>state.scores[p]=0);state.topics=shuffle([...TOPICS]).slice(0,state.totalRounds);state.currentRound=0;state.roundHistory=[];startRound();});
document.getElementById('btn-setup-again').addEventListener('click',()=>show('screen-setup'));
</script>
